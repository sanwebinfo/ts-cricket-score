description: Prepares the repo for a typical CI job

name: Prepare

runs:
  steps:
    - uses: pnpm/action-setup@v5.0.0
      with:
        version: 10.33.0
    - uses: actions/setup-node@v6
      with:
        node-version: '22.22.2'
        cache: pnpm
    - run: pnpm install
      shell: bash
  using: composite